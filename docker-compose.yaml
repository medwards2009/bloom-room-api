services:
  db:
    image: postgres:16
    container_name: bloom-room-db
    environment:
      POSTGRES_USER: bloom
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: bloom_room_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bloom -d bloom_room_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
